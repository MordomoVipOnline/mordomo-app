<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, viewport-fit=cover"
        />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <title>Mordomo — Atendente Virtual</title>
        <style>
            /* ============ Mordomo Design Tokens ============ */
            :root {
                /* Neutrals (light) */
                --bg: #f7f5f2;
                --surface: #ffffff;
                --surface-2: #fbf9f6;
                --surface-sunk: #f1eee9;
                --ink-1: #191714;
                --ink-2: #3a362f;
                --ink-3: #6e675c;
                --ink-4: #a59e90;
                --line: rgba(25, 23, 20, 0.08);
                --line-strong: rgba(25, 23, 20, 0.14);

                /* Accent — Bronze (default) */
                --accent: #8e6a3d;
                --accent-soft: #e8dbc5;
                --accent-ink: #4a3620;

                /* Semantic */
                --success: #5b7a4c;
                --pending: #b0893f;
                --info: #4b6a8b;
                --danger: #a64a3d;

                /* Radii */
                --r-xs: 8px;
                --r-sm: 12px;
                --r-md: 18px;
                --r-lg: 24px;
                --r-xl: 32px;
                --r-full: 999px;

                /* Shadows */
                --shadow-1:
                    0 1px 2px rgba(25, 23, 20, 0.04),
                    0 1px 0 rgba(25, 23, 20, 0.02);
                --shadow-2:
                    0 4px 16px -4px rgba(25, 23, 20, 0.08),
                    0 1px 2px rgba(25, 23, 20, 0.04);
                --shadow-3:
                    0 20px 40px -20px rgba(25, 23, 20, 0.18),
                    0 2px 6px rgba(25, 23, 20, 0.04);
                --shadow-float: 0 30px 60px -20px rgba(25, 23, 20, 0.28);

                /* Typography */
                --font-sans:
                    "Geist", -apple-system, BlinkMacSystemFont, "SF Pro Text",
                    system-ui, sans-serif;
                --font-serif: "Instrument Serif", "Times New Roman", serif;
                --font-mono: "Geist Mono", ui-monospace, monospace;

                /* Density */
                --pad-screen: 20px;
                --pad-card: 18px;
                --gap-stack: 14px;
            }

            [data-density="compact"] {
                --pad-screen: 16px;
                --pad-card: 14px;
                --gap-stack: 10px;
            }

            /* Accent variants */
            [data-accent="sage"] {
                --accent: #5f7a5d;
                --accent-soft: #dce6d7;
                --accent-ink: #2f4130;
            }
            [data-accent="indigo"] {
                --accent: #3b4a7a;
                --accent-soft: #d8dbea;
                --accent-ink: #232b49;
            }
            [data-accent="terracotta"] {
                --accent: #a65a3d;
                --accent-soft: #ebcfbf;
                --accent-ink: #5e2d1c;
            }
            [data-accent="graphite"] {
                --accent: #2c2a28;
                --accent-soft: #dfdcd7;
                --accent-ink: #0f0e0c;
            }

            /* Dark */
            [data-theme="dark"] {
                --bg: #0e0d0b;
                --surface: #181613;
                --surface-2: #1f1c18;
                --surface-sunk: #0a0908;
                --ink-1: #f5f1ea;
                --ink-2: #d5cfc3;
                --ink-3: #948e82;
                --ink-4: #5c574f;
                --line: rgba(255, 250, 240, 0.08);
                --line-strong: rgba(255, 250, 240, 0.14);
                --accent-soft: rgba(232, 219, 197, 0.12);
                --accent-ink: #e8dbc5;
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--ink-1);
                background: var(--bg);
                overscroll-behavior: none;
            }

            body {
                min-height: 100dvh;
            }

            /* App shell */
            .mordomo-phone {
                /* padding-top: env(safe-area-inset-top, 12px); */
                padding-top: 2rem;
                min-height: 100dvh;
                background: var(--bg);
                position: relative;
                display: flex;
                flex-direction: column;
                color: var(--ink-1);
            }

            /* Status bar */
            .status-bar {
                height: 44px;
                padding: 0 28px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                font-size: 14px;
                font-weight: 600;
                color: var(--ink-1);
                flex-shrink: 0;
                letter-spacing: -0.01em;
            }
            .status-bar .icons {
                display: flex;
                gap: 5px;
                align-items: center;
            }

            /* Scroll container */
            .screen {
                flex: 1;
                overflow-y: auto;
                overflow-x: clip;
                scroll-behavior: smooth;
                padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
            }
            .screen::-webkit-scrollbar {
                display: none;
            }

            /* Tab bar */
            .tab-bar {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: color-mix(
                    in oklab,
                    var(--surface) 85%,
                    transparent
                );
                backdrop-filter: blur(24px) saturate(180%);
                -webkit-backdrop-filter: blur(24px) saturate(180%);
                border-top: 0.5px solid var(--line);
                padding: 10px 12px env(safe-area-inset-bottom, 16px);
                display: flex;
                justify-content: space-around;
                z-index: 20;
            }
            .tab {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 3px;
                padding: 6px 4px;
                font-size: 10px;
                font-weight: 500;
                color: var(--ink-3);
                background: none;
                border: none;
                cursor: pointer;
                letter-spacing: 0.01em;
                transition: color 0.15s;
            }
            .tab.active {
                color: var(--accent-ink);
            }
            [data-theme="dark"] .tab.active {
                color: var(--accent-ink);
            }
            .tab svg {
                width: 22px;
                height: 22px;
            }

            /* Typography helpers */
            .t-display {
                font-family: var(--font-serif);
                font-weight: 400;
                font-size: 40px;
                line-height: 1.02;
                letter-spacing: -0.02em;
                color: var(--ink-1);
            }
            .t-display em {
                font-style: italic;
            }
            [data-serif-titles="false"] .t-display {
                font-family: var(--font-sans);
                font-weight: 500;
                letter-spacing: -0.03em;
            }

            .t-h1 {
                font-size: 28px;
                font-weight: 600;
                letter-spacing: -0.03em;
                line-height: 1.1;
            }
            .t-h2 {
                font-size: 22px;
                font-weight: 600;
                letter-spacing: -0.02em;
                line-height: 1.15;
            }
            .t-h3 {
                font-size: 17px;
                font-weight: 600;
                letter-spacing: -0.015em;
                line-height: 1.25;
            }
            .t-body {
                font-size: 15px;
                line-height: 1.45;
                color: var(--ink-2);
            }
            .t-sm {
                font-size: 13px;
                line-height: 1.4;
                color: var(--ink-3);
            }
            .t-xs {
                font-size: 11px;
                line-height: 1.3;
                color: var(--ink-3);
                letter-spacing: 0.02em;
            }
            .t-eyebrow {
                font-size: 11px;
                font-weight: 500;
                text-transform: uppercase;
                letter-spacing: 0.12em;
                color: var(--ink-3);
            }

            /* Card */
            .card {
                background: var(--surface);
                border-radius: var(--r-md);
                border: 0.5px solid var(--line);
                box-shadow: var(--shadow-1);
                overflow: hidden;
            }

            /* Pill / chip */
            .chip {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                border-radius: var(--r-full);
                font-size: 12px;
                font-weight: 500;
                background: var(--surface);
                border: 0.5px solid var(--line-strong);
                color: var(--ink-2);
                cursor: pointer;
                white-space: nowrap;
                transition: all 0.15s;
            }
            .chip.active {
                background: var(--ink-1);
                color: var(--bg);
                border-color: var(--ink-1);
            }
            [data-theme="dark"] .chip.active {
                background: var(--ink-1);
                color: var(--bg);
            }

            .chip-soft {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 4px 10px;
                border-radius: var(--r-full);
                font-size: 11px;
                font-weight: 500;
                background: var(--accent-soft);
                color: var(--accent-ink);
                letter-spacing: 0.01em;
            }

            /* Buttons */
            .btn {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                padding: 14px 20px;
                border-radius: var(--r-full);
                font-family: var(--font-sans);
                font-size: 15px;
                font-weight: 500;
                cursor: pointer;
                border: none;
                transition:
                    transform 0.1s,
                    opacity 0.15s;
                letter-spacing: -0.01em;
            }
            .btn:active {
                transform: scale(0.97);
            }
            .btn-primary {
                background: var(--ink-1);
                color: var(--bg);
            }
            .btn-secondary {
                background: var(--surface);
                color: var(--ink-1);
                border: 0.5px solid var(--line-strong);
            }
            .btn-ghost {
                background: transparent;
                color: var(--ink-1);
            }
            .btn-accent {
                background: var(--accent);
                color: #fff;
            }
            [data-theme="dark"] .btn-accent {
                color: var(--ink-1);
            }

            /* Image placeholder — tasteful gradient cells */
            .ph {
                position: relative;
                width: 100%;
                height: 100%;
                background: var(--surface-sunk);
                overflow: hidden;
            }
            .ph::before {
                content: "";
                position: absolute;
                inset: 0;
                background: var(
                    --grad,
                    linear-gradient(135deg, #c8b694 0%, #8e6a3d 100%)
                );
            }
            .ph::after {
                content: "";
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        circle at 20% 30%,
                        rgba(255, 255, 255, 0.25),
                        transparent 50%
                    ),
                    radial-gradient(
                        circle at 80% 70%,
                        rgba(0, 0, 0, 0.15),
                        transparent 50%
                    );
            }
            .ph-label {
                position: absolute;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: var(--font-serif);
                font-style: italic;
                font-size: 28px;
                color: rgba(255, 255, 255, 0.75);
                z-index: 2;
                letter-spacing: -0.02em;
            }

            /* Scroll row (horizontal) */
            .hscroll {
                display: flex;
                gap: 12px;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0 var(--pad-screen) 4px;
                margin: 0 calc(var(--pad-screen) * -1);
                scroll-snap-type: x mandatory;
                scroll-padding-inline-start: var(--pad-screen);
            }
            .hscroll > * {
                scroll-snap-align: start;
                flex-shrink: 0;
            }
            .hscroll::-webkit-scrollbar {
                display: none;
            }
            .hscroll {
                scrollbar-width: none;
            }

            /* Section block */
            .section {
                padding: 0 var(--pad-screen);
                margin-bottom: 28px;
            }
            .section-hd {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                margin-bottom: 14px;
            }
            .section-hd .title {
                letter-spacing: -0.02em;
                font-weight: 600;
                font-size: 20px;
            }

            /* Page transitions */
            .fade-in {
                animation: fadeIn 0.3s ease-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(6px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            .slide-up {
                animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: none;
                }
            }

            /* Sheet */
            .sheet-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(10, 9, 8, 0.4);
                backdrop-filter: blur(4px);
                z-index: 40;
                animation: fadeIn 0.2s;
            }
            .sheet {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--surface);
                border-radius: 28px 28px 0 0;
                z-index: 41;
                max-height: 88%;
                overflow: hidden;
                animation: sheetUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
                display: flex;
                flex-direction: column;
            }
            @keyframes sheetUp {
                from {
                    transform: translateY(100%);
                }
                to {
                    transform: translateY(0);
                }
            }
            .sheet-handle {
                width: 36px;
                height: 4px;
                background: var(--line-strong);
                border-radius: 2px;
                margin: 10px auto 0;
                flex-shrink: 0;
            }

            /* Toast */
            .toast {
                position: fixed;
                bottom: calc(80px + env(safe-area-inset-bottom, 0px));
                left: 50%;
                transform: translateX(-50%);
                background: var(--ink-1);
                color: var(--bg);
                padding: 12px 18px;
                border-radius: var(--r-full);
                font-size: 13px;
                font-weight: 500;
                z-index: 50;
                box-shadow: var(--shadow-3);
                animation: toastIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
                display: flex;
                align-items: center;
                gap: 8px;
                white-space: nowrap;
                max-width: 90%;
            }
            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translate(-50%, 20px);
                }
                to {
                    opacity: 1;
                    transform: translate(-50%, 0);
                }
            }

            /* Divider */
            .div-line {
                height: 0.5px;
                background: var(--line);
                margin: 0;
                border: 0;
            }

            /* Row */
            .row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 14px 0;
            }

            /* Status dots */
            .dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                display: inline-block;
            }
            .dot-success {
                background: var(--success);
            }
            .dot-pending {
                background: var(--pending);
            }
            .dot-info {
                background: var(--info);
            }

            /* Tweaks panel */
            .tweaks-panel {
                position: fixed;
                right: 12px;
                bottom: calc(80px + env(safe-area-inset-bottom, 0px));
                width: 280px;
                background: color-mix(
                    in oklab,
                    var(--surface) 92%,
                    transparent
                );
                backdrop-filter: blur(20px);
                border-radius: 20px;
                box-shadow: var(--shadow-3);
                border: 0.5px solid var(--line-strong);
                padding: 16px;
                z-index: 60;
                font-size: 13px;
                animation: slideUp 0.25s;
            }
            .tweaks-panel h4 {
                margin: 0 0 12px;
                font-size: 14px;
                font-weight: 600;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .tweaks-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 8px 0;
                border-bottom: 0.5px solid var(--line);
            }
            .tweaks-row:last-child {
                border-bottom: none;
            }
            .tweaks-row label {
                color: var(--ink-3);
                font-size: 12px;
            }
            .swatch-row {
                display: flex;
                gap: 6px;
            }
            .swatch {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                cursor: pointer;
                border: 2px solid transparent;
                transition: all 0.15s;
            }
            .swatch.active {
                border-color: var(--ink-1);
                transform: scale(1.1);
            }
            .seg {
                display: flex;
                background: var(--surface-sunk);
                border-radius: 8px;
                padding: 2px;
            }
            .seg button {
                border: none;
                background: none;
                padding: 4px 10px;
                border-radius: 6px;
                font-size: 11px;
                cursor: pointer;
                color: var(--ink-3);
                font-family: var(--font-sans);
            }
            .seg button.active {
                background: var(--surface);
                color: var(--ink-1);
                box-shadow: var(--shadow-1);
            }

            /* Butler conversation bubble */
            .butler-bubble {
                display: flex;
                gap: 10px;
                padding: 14px 16px;
                background: var(--surface);
                border-radius: 20px 20px 20px 6px;
                border: 0.5px solid var(--line);
                box-shadow: var(--shadow-1);
                align-items: flex-start;
            }
            .butler-avatar {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    var(--accent) 0%,
                    var(--accent-ink) 100%
                );
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                color: #fff;
                font-family: var(--font-serif);
                font-style: italic;
                font-size: 16px;
                box-shadow: var(--shadow-1);
            }

            /* Pressable */
            .press {
                cursor: pointer;
                -webkit-tap-highlight-color: transparent;
                transition: transform 0.08s;
            }
            .press:active {
                transform: scale(0.98);
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script>
            const TWEAKS = /*EDITMODE-BEGIN*/ {
                theme: "light",
                accent: "bronze",
                density: "spacious",
                timeOfDay: "afternoon",
                serifTitles: true,
            } /*EDITMODE-END*/
            window.__TWEAKS__ = TWEAKS
        </script>

        <script type="module" src="/main.jsx"></script>
    </body>
</html>
